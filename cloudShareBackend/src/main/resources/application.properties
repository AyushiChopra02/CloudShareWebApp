# ═══════════════════════════════════════════════════════════
# CloudShare Backend - Application Configuration
# ═══════════════════════════════════════════════════════════

server.port=8080

# ─── MySQL Database ───────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/cloudshare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.url=jdbc:mysql://mysql-container:3306/cloudshare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=020705
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# dialect auto-detected by Hibernate

# ─── File Storage ─────────────────────────────────────────
# Local directory where uploaded files are stored
file.storage.location=./uploads
# Max file size (50 MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Tomcat's own form-post limit must also be raised (default is 2MB).
# Without this, Tomcat aborts the connection for files >2MB before Spring can
# respond, which causes "Failed to fetch" in the browser instead of a proper error.


# ─── Clerk Auth ───────────────────────────────────────────
# Your Clerk Frontend API / JWKS issuer domain
clerk.issuer=https://knowing-pika-78.clerk.accounts.dev
clerk.jwks-url=https://knowing-pika-78.clerk.accounts.dev/.well-known/jwks.json

# ─── CORS ─────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# ─── Logging ──────────────────────────────────────────────
logging.level.com.cloudshare=DEBUG
